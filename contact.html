<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>ABC Toys Contacts and Comments</title>
  <meta name="description" content="ABC Toys contact info and comment form">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Latest Bootstrap compiled and minified CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
<div class="container ms-0 ms-sm-1 ms-lg-2">     <!-- wrapper for entire body -->
  <header>
    <div class="d-flex align-items-center">
      <img src="ABCToyslogo6.png" alt="ABC Toys company logo" class="img-fluid me-2" style="max-height: 169px; width: auto;">
      <h1 class="mb-0">Making learning fun.</h1>
    </div>
  </header>

  <nav class="navbar  navbar-expand-sm  bg-primary-subtle">
    <div class="container-fluid">
        
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="collapsibleNavbar">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="indexhw3.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="products.html">Products</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="location.html">Location</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="extra.html">Extra</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  
  <p class="mt-4 fs-5">Contact Details:</p>

  <div class="container mt-2 lh-sm">     <!-- container for Details provides indent of Details -->
    <div class="row">                    <!-- Row 1 --> 
      <div class="col-sm-2 col-lg-1">         <!-- Column 1: Field Label -->
        <p>Telephone:</p>
      </div>
      <div class="col-sm-10 col-lg-11">        <!-- Column 2: Field Data -->
        <p><a href="tel:+1-650-123-4567">(650) 123-4567</a></p>
      </div>
    </div>

    <div class="row">                <!-- Row 2 -->
      <div class="col-sm-2 col-lg-1">          <!-- Column 1: Field Label -->
        <p>Address:</p>
      </div>
      <div class="col-sm-10 col-lg-11">        <!-- Column 2: Field Data -->
        <address>
        89 Main St<br>
        Townville, CA 98765
        </address>
      </div>  
    </div>

    <div class="row">                <!-- Row 3 -->
      <div class="col-sm-2 col-lg-1">         <!-- Column 1: Field Label -->
        <p>Email:</p>
      </div>
      <div class="col-sm-10 col-lg-11">        <!-- Column 2: Field Data -->
        <p><a href="mailto:info@ACToys.com">info@ABCToys.com</a></p>
      </div>
    </div>

    <div class="row">                <!-- Row 4 -->
      <div class="col-sm-2 col-lg-1">         <!-- Column 1: Field Label -->
        <p>FaceBook:</p>
      </div>
      <div class="col-sm-10 col-lg-11">        <!-- Column 2: Field Data -->
        <p><a href="https://Facebook.com/ABCToys">Facebook.com/ABCToys</a></p>
      </div>
    </div>
  </div>

  <p class="pt-2 fs-5">We'd like to hear from you!</p>

  <div class="container mt-2">       <!-- container for form provides indent of form items -->
    <form>
      <div class="form-group col-xl-6">
        <label for="comments" class="form-label">Comments/Questions:</label>
        <textarea maxlength="500" class="form-control form-control-lg" id="comments" name="comments" placeholder="Enter your comments or questions" rows="3"></textarea>
      </div>
    
      <div class="form-group">
        <label for="name" class="form-label">Your name:</label>
        <input type="text" class="form-control-sm" id="name" name="name" placeholder="Enter name">
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Your email:</label>
        <input type="email" class="form-control-sm" id="email" name="email" placeholder="Enter email">
      </div>

      <br>
    
      <label><button type="reset" class="btn btn-secondary d-inline-block">Clear form</button></label>
      <label><button type="submit" class="btn btn-primary">Submit</button></label>
    </form>  
  </div>    
  

  <!-- Latest compiled JavaScript file for Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
  </script>
</div>  
</body>

</html>
